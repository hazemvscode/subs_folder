<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" href="/blue_galaxy.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .login-wrap { max-width: 460px; margin: 40px auto; }
        .note { font-size: 0.95rem; opacity: 0.9; text-align: center; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="page-header">
            <h1 class="neon-text">Admin Login</h1>
            <p class="note">Authorized admins only.</p>
        </div>
        <div class="login-wrap card">
            <form method="POST" action="/admin/login">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="button">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
