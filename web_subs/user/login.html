<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login</title>
    <link rel="icon" href="/favicon.png">
    <link rel="stylesheet" href="/blue_galaxy.css">

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }
        .wrap {
            width: min(980px, 100%);
            display: grid;
            gap: 18px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }
        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 28px;
            box-shadow: var(--shadow);
        }
        .card.title {
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
            background:
                linear-gradient(var(--card), var(--card)) padding-box,
                linear-gradient(135deg, rgba(255,107,74,0.5), rgba(123,213,196,0.35), rgba(255,255,255,0.1)) border-box;
        }
        .card.title::before {
            content: "";
            position: absolute;
            inset: -20% -10% auto auto;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(255,107,74,0.25), transparent 60%);
            filter: blur(6px);
            opacity: 0.7;
        }
        .card.title::after {
            content: "";
            position: absolute;
            inset: auto auto -30% -10%;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(123,213,196,0.25), transparent 60%);
            filter: blur(6px);
            opacity: 0.7;
        }
        .hero-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.7);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
        }
        .title h1 {
            font-size: clamp(1.8rem, 3.5vw, 2.6rem);
            line-height: 1.1;
        }
        .title p {
            max-width: 320px;
        }
        .title-grid {
            position: relative;
            z-index: 1;
            display: grid;
            gap: 14px;
        }
        .chip-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chip {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.6);
            font-size: 0.72rem;
            color: var(--muted);
        }
        h1 {
            margin: 0 0 8px;
            letter-spacing: 0.4px;
        }
        h2 { margin: 0 0 10px; }
        p { margin: 0 0 18px; color: var(--muted); }
        label { font-size: 0.78rem; letter-spacing: 0.6px; text-transform: uppercase; color: var(--muted); }
        input {
            width: 100%;
            margin: 8px 0 16px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.95);
            color: var(--ink);
            outline: none;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.18);
        }
        .input-row {
            position: relative;
        }
        .input-row .toggle-pass {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: 1px solid var(--card-border);
            background: transparent;
            color: var(--muted);
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            cursor: pointer;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 13px 18px;
            border-radius: 999px;
            border: 1px solid var(--button-border);
            background: var(--button-bg);
            color: var(--button-ink);
            letter-spacing: 0.4px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn.secondary {
            background: transparent;
            color: var(--ink);
            border: 1px solid var(--card-border);
        }
        .btn.small-toggle {
            width: auto;
            padding: 8px 12px;
            font-size: 0.78rem;
            border-radius: 999px;
        }
        .admin-link {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }
        .admin-link .admin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            display: inline-block;
            box-shadow: 0 6px 14px rgba(0,0,0,0.18);
        }
        .admin-float {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 50;
        }
        .note { font-size: 0.8rem; opacity: 0.75; margin-top: 12px; color: var(--muted); }
        .title { text-align: left; margin-bottom: 10px; }
        .badge { display: inline-block; padding: 6px 12px; border-radius: 999px; border: 1px solid rgba(20,20,20,0.18); font-size: 0.74rem; letter-spacing: 0.7px; text-transform: uppercase; color: var(--muted); background: rgba(255,255,255,0.8); }
        .btn.google {
            background: transparent;
            border: 1px dashed var(--card-border);
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card title">
            <div class="title-grid">
                <div class="hero-label">Secure Access</div>
                <h1>Bot Subscriptions</h1>
                <p>Organized access for clans. Log in fast and keep everything synced.</p>
                <div class="chip-row">
                    <div class="chip">Fast Setup</div>
                    <div class="chip">Verified Payments</div>
                    <div class="chip">Clean Dashboard</div>
                </div>
                <button class="btn secondary small-toggle" type="button" data-action="toggle-theme">Dark Mode</button>
                <div class="admin-link">
                    <a class="admin-dot" href="/admin/login" aria-label="Admin Login"></a>
                </div>
            </div>
        </div>
        <form id="userLoginForm" class="card">
            <h2>User Login</h2>
            <p>For players and clan members.</p>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
            <label for="password">Password</label>
            <div class="input-row">
                <input id="password" name="password" type="password" placeholder="••••••••" required />
                <button class="toggle-pass" type="button" data-action="toggle-password" data-target="password">Show</button>
            </div>
            <button class="btn" type="submit">Enter User Area</button>
            <button class="btn google" type="button" disabled>Continue with Google (Soon)</button>
            <div class="note">New here? <a href="/user/signup">Create an account</a>.</div>
            <button class="btn secondary small-toggle" type="button" data-action="toggle-theme" style="margin-top:10px;">Dark Mode</button>
        </form>
    </div>
    <a class="admin-dot admin-float" href="/admin/login" aria-label="Admin Login"></a>
    <script src="/script.js"></script>
</body>
</html>
